[package]
name = "lingua-live-desktop"
version = "0.3.5"
description = "LinguaLive desktop shell"
authors = ["LinguaLive"]
edition = "2021"

[lib]
name = "lingua_live_desktop_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
cpal = "0.15"
tauri-plugin-http = "2.5.9"
tauri-plugin-dialog = "2.7.1"

[profile.release]
lto = true
codegen-units = 1
strip = true
panic = "abort"
